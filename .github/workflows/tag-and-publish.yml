name: Tag and publish

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  tag-and-publish:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read VERSION
        id: ver
        run: |
          VERSION=$(tr -d ' \n' < VERSION)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Guard against duplicate tag
        run: |
          git fetch --tags --force
          TAG="v${{ steps.ver.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Aborting to prevent duplicate release."
            exit 1
          fi

      - name: Create and push annotated tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.ver.outputs.version }}" -m "Release v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: tags
        run: |
          TAGS="ghcr.io/${{ github.repository_owner }}/remakeover:${{ steps.ver.outputs.version }}"
          if [[ "${{ steps.ver.outputs.prerelease }}" == "false" ]]; then
            TAGS="${TAGS}"$'\n'"ghcr.io/${{ github.repository_owner }}/remakeover:latest"
          fi
          { echo "tags<<EOF"; echo "$TAGS"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
