name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: "Sanity: show Python and packages"
        run: |
          python --version
          pip --version
          pip list
      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q
