name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Show Python and packages versions
        run: |
          python --version
          pip --version
          pip list
      - name: Compile translations
        run: pybabel compile -d locales -D rmmanager
      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q
